name: Announce release to Discord

# Posts to the #announcements webhook whenever a GitHub Release is published
# (right after `scripts/release.sh` runs `gh release create`). Can also be run
# manually from the Actions tab to re-announce the latest release. The message
# is the release's own notes (lifted from CHANGELOG.md) plus the install line,
# so the announcement stays in sync with the changelog automatically.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Post release to #announcements
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          EVENT_BODY: ${{ github.event.release.body }}
        run: |
          # Skip quietly if the secret isn't configured, so a missing webhook
          # never hard-fails a release.
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK not set — skipping announcement."
            exit 0
          fi
          # On a release event the tag/body arrive in the payload; on a manual
          # run they don't, so fall back to the latest published release.
          if [ -n "$EVENT_TAG" ]; then
            TAG="$EVENT_TAG"
            BODY="$EVENT_BODY"
          else
            TAG=$(gh release view --repo "$REPO" --json tagName -q .tagName)
            BODY=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
          fi
          VERSION="${TAG#v}"
          # jq builds and escapes the whole payload. Notes ($body) are passed via
          # --arg (safe from shell injection); newlines come from jq's \n so there
          # are no raw line breaks in this YAML block. allowed_mentions blocks
          # accidental @everyone pings if notes ever contain one.
          PAYLOAD=$(jq -n \
            --arg v "$VERSION" \
            --arg body "$BODY" \
            '{
              username: "Release Bot",
              content: ("🚀 **@vibedrift/cli " + $v + " is out.**\n\n" + $body + "\n\n`npm i -g @vibedrift/cli@latest`"),
              allowed_mentions: { parse: [] }
            }')
          curl -fsS -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
          echo "Announced $TAG to Discord."
